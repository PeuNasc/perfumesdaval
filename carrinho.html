<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - Perfumes da Val</title>
    <link rel="stylesheet" href="stylecarrinho.css">
</head>
<body>

    <header class="header">
        <h1>Perfumes da Val - Carrinho</h1>
    </header>

    <section id="cart" class="cart">
        <h2>Itens no Carrinho</h2>
        <ul id="cart-items"></ul>
        <p>Total: R$ <span id="cart-total">0.00</span></p>
    </section>

    <footer class="footer">
        <p>&copy; 2025 Perfumes da Val. Todos os direitos reservados.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const cart = [];
            const cartItems = document.getElementById("cart-items");
            const cartTotal = document.getElementById("cart-total");

            function updateCart() {
                cartItems.innerHTML = "";
                let total = 0;

                cart.forEach((item, index) => {
                    total += item.price;
                    const li = document.createElement("li");
                    li.textContent = `${item.name} - R$ ${item.price.toFixed(2)}`;

                    const removeButton = document.createElement("button");
                    removeButton.textContent = "Remover";
                    removeButton.addEventListener("click", () => {
                        cart.splice(index, 1);
                        updateCart();
                        saveCartToLocalStorage();
                    });

                    li.appendChild(removeButton);
                    cartItems.appendChild(li);
                });

                cartTotal.textContent = total.toFixed(2);
            }

            function loadCartFromLocalStorage() {
                const storedCart = JSON.parse(localStorage.getItem("cart"));
                if (storedCart) {
                    cart.push(...storedCart);
                    updateCart();
                }
            }

            loadCartFromLocalStorage();
        });
    </script>
    <section id="checkout">
        <button id="whatsapp-button" class="whatsapp-btn">
            Enviar Pedido para o WhatsApp 🛒
        </button>
    </section>
    
    <script>
        document.getElementById("whatsapp-button").addEventListener("click", function() {
            let cartItems = JSON.parse(localStorage.getItem("cart")) || [];
            let cartMessage = "Olá! tudo bem? Meu pedido no PERFUMES DA VAL é:     \n";

            cartItems.forEach(item => {
                cartMessage += `${item.name} - R$ ${item.price.toFixed(2)}\n`;
            });
    
            cartMessage += `\nTotal: R$ ${cartItems.reduce((total, item) => total + item.price, 0).toFixed(2)}`;
    
            let whatsappLink = `https://wa.me/557591305599?text=${encodeURIComponent(cartMessage)}`;
            
            window.open(whatsappLink, "_blank");
        });
    </script>
</body>
</html>
